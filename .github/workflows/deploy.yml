name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Wait for CI to pass before deploying
  # ─────────────────────────────────────────────
  ci-check:
    name: "Wait for CI"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify CI passed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "G1: Unit Tests + Coverage"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      - name: Verify Integration Tests passed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "G2: Integration + Isolation Tests"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      - name: Verify Security passed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "G3: Security"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      - name: Verify Build passed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "G4: Build + Typecheck"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  # ─────────────────────────────────────────────
  # Gate G5: Deploy to Staging + Health Check
  # ─────────────────────────────────────────────
  deploy-staging:
    name: "G5: Deploy Staging"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ci-check]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # Deploy API to Railway (staging)
      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service api --environment staging

      # Deploy Console to Vercel (staging/preview)
      - name: Deploy Console to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel deploy --token=$VERCEL_TOKEN

      # Deploy Workers to Railway (staging)
      - name: Deploy Workers to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service workers-push --environment staging
          railway up --service workers-ingestion --environment staging
          railway up --service workers-analytics --environment staging

      # Health check — wait for services to be ready
      - name: Health Check API
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${{ vars.STAGING_API_URL }}/health" > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... attempt $i/30"
            sleep 10
          done
          echo "API health check failed after 5 minutes"
          exit 1

  # ─────────────────────────────────────────────
  # Gate G6: Smoke Tests on Staging
  # ─────────────────────────────────────────────
  smoke-tests:
    name: "G6: Smoke Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Smoke test: verify critical endpoints respond
      - name: Smoke Tests
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
          STAGING_CONSOLE_URL: ${{ vars.STAGING_CONSOLE_URL }}
        run: |
          echo "Running smoke tests against staging..."
          FAILURES=0

          # 1. Health endpoint (API + DB connectivity)
          if curl -sf "$STAGING_API_URL/health" > /dev/null 2>&1; then
            echo "PASS: /health"
          else
            echo "FAIL: /health unreachable"
            FAILURES=$((FAILURES+1))
          fi

          # 2. Auth guard — unauthenticated requests return 401/403, not 500
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_API_URL/api/notifications")
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "PASS: /api/notifications returns auth error (expected)"
          else
            echo "FAIL: /api/notifications returned $STATUS (expected 401/403)"
            FAILURES=$((FAILURES+1))
          fi

          # 3. Auth guard on second endpoint
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_API_URL/api/tenants")
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "PASS: /api/tenants returns auth error (expected)"
          else
            echo "FAIL: /api/tenants returned $STATUS (expected 401/403)"
            FAILURES=$((FAILURES+1))
          fi

          # 4. Console is reachable
          if [ -n "$STAGING_CONSOLE_URL" ]; then
            CONSOLE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_CONSOLE_URL")
            if [ "$CONSOLE_STATUS" -ge 200 ] && [ "$CONSOLE_STATUS" -lt 400 ]; then
              echo "PASS: Console reachable ($CONSOLE_STATUS)"
            else
              echo "FAIL: Console returned $CONSOLE_STATUS"
              FAILURES=$((FAILURES+1))
            fi
          else
            echo "SKIP: STAGING_CONSOLE_URL not set"
          fi

          # 5. Invalid route returns 404, not 500
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_API_URL/api/nonexistent-route")
          if [ "$STATUS" = "404" ]; then
            echo "PASS: Unknown route returns 404"
          else
            echo "FAIL: Unknown route returned $STATUS (expected 404)"
            FAILURES=$((FAILURES+1))
          fi

          if [ "$FAILURES" -gt 0 ]; then
            echo "FAILED: $FAILURES smoke test(s) failed"
            exit 1
          fi
          echo "All smoke tests passed"

      # Auto-rollback on failure: redeploy previous commit
      - name: Rollback Railway on Failure
        if: failure()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Smoke tests failed — rolling back staging to previous commit"
          npm install -g @railway/cli
          PREV_SHA=$(git rev-parse HEAD~1)
          git checkout "$PREV_SHA" -- .
          railway up --service api --environment staging
          railway up --service workers-push --environment staging
          railway up --service workers-ingestion --environment staging
          railway up --service workers-analytics --environment staging
          echo "Railway rollback deployed from $PREV_SHA"

      - name: Rollback Console on Failure
        if: failure()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Rolling back Console to previous Vercel deployment"
          npm install -g vercel
          PREV_DEPLOY=$(vercel list --token=$VERCEL_TOKEN --meta gitSha=$(git rev-parse HEAD~1) 2>/dev/null | grep -m1 'https://' | awk '{print $2}')
          if [ -n "$PREV_DEPLOY" ]; then
            vercel promote "$PREV_DEPLOY" --token=$VERCEL_TOKEN
            echo "Console rollback promoted: $PREV_DEPLOY"
          else
            echo "WARNING: Could not find previous Vercel deployment to rollback"
          fi

  # ─────────────────────────────────────────────
  # Gate G7: Manual Approval → Production Deploy
  # ─────────────────────────────────────────────
  deploy-production:
    name: "G7: Deploy Production"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [smoke-tests]
    environment: production  # Requires manual approval configured in GitHub repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API to Railway (Production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
        run: |
          npm install -g @railway/cli
          railway up --service api --environment production

      - name: Deploy Workers to Railway (Production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
        run: |
          railway up --service workers-push --environment production
          railway up --service workers-ingestion --environment production
          railway up --service workers-analytics --environment production

      - name: Deploy Console to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token=$VERCEL_TOKEN

      - name: Production Health Check
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${{ vars.PRODUCTION_API_URL }}/health" > /dev/null 2>&1; then
              echo "Production API is healthy"
              exit 0
            fi
            echo "Waiting for Production API... attempt $i/30"
            sleep 10
          done
          echo "Production health check failed after 5 minutes"
          exit 1
