name: appfy_mobile
description: AppFy - E-commerce App Builder Mobile Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # WebView
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0

  # Storage
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.20
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Network
  dio: ^5.4.1
  connectivity_plus: ^5.0.2

  # Push Notifications
  onesignal_flutter: ^5.1.6

  # Deep Links
  app_links: ^4.0.1

  # Crypto (for Remote Config signature validation)
  cryptography: ^2.7.0

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  logger: ^2.2.0
  path_provider: ^2.1.2
  package_info_plus: ^6.0.0
  device_info_plus: ^10.1.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  riverpod_generator: ^2.3.11
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/
