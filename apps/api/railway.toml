[build]
builder = "nixpacks"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @appfy/shared build && cd apps/api && pnpm db:generate && pnpm build"

[deploy]
startCommand = "pnpm db:migrate:prod && node dist/main.js"
healthcheckPath = "/v1/health/live"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
