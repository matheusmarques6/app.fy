version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: appfy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appfy
      POSTGRES_PASSWORD: appfy_dev_password
      POSTGRES_DB: appfy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appfy -d appfy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local Redis for development only.
  # Production uses Upstash Redis (rediss://): set REDIS_URL=rediss://default:[token]@[host].upstash.io:6380
  redis:
    image: redis:7-alpine
    container_name: appfy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for local S3-compatible storage (R2 alternative)
  minio:
    image: minio/minio:latest
    container_name: appfy-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: appfy_minio
      MINIO_ROOT_PASSWORD: appfy_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Commander for debugging (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: appfy-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: appfy-network
